<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteSystem - Professional Quote Management</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #1B2F4E; --navy-light: #243d62; --blue: #2563EB; --blue-hover: #1D4ED8;
  --green: #059669; --red: #DC2626; --amber: #D97706; --gray: #6B7280;
  --border: #E5E7EB; --bg: #F0F4F8; --white: #FFFFFF;
  --quote-header: #8B1A1A; /* dark maroon for section headers */
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #111; }
.container { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; background: var(--navy); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 22px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #fff; }
.sidebar-header .logo { font-size: 22px; margin-bottom: 6px; }
.sidebar-header .company-name { font-weight: 700; font-size: 14px; line-height: 1.3; margin-bottom: 4px; }
.sidebar-header .user-name { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 6px; }
.sidebar-header .role-badge { display: inline-block; background: rgba(255,255,255,0.12); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-top: 4px; letter-spacing: 0.06em; }
.sidebar nav { flex: 1; padding: 10px 0; overflow-y: auto; }
.nav-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 20px; border: none; border-left: 3px solid transparent; background: transparent; color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 400; cursor: pointer; text-align: left; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.08); }
.nav-item.active { border-left-color: #60A5FA; background: rgba(255,255,255,0.1); color: #fff; font-weight: 600; }
.sidebar-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
.logout-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; border-radius: 7px; transition: all 0.15s; }
.main { flex: 1; overflow-y: auto; padding: 28px; }
.toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 12px 22px; border-radius: 9px; color: #fff; font-weight: 600; font-size: 13px; box-shadow: 0 6px 20px rgba(0,0,0,0.18); animation: slideIn 0.3s ease-out; }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
@keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.card { background: var(--white); border-radius: 12px; box-shadow: 0 1px 5px rgba(0,0,0,0.07); padding: 24px; margin-bottom: 14px; }
.input-field { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; outline: none; font-family: inherit; background: #fff; color: #111; margin-bottom: 12px; }
.button { padding: 9px 18px; background: var(--blue); color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
.button:hover { background: var(--blue-hover); }
.button.navy { background: var(--navy); }
.button.green { background: var(--green); }
.button.red { background: var(--red); }
.button.secondary { background: #F3F4F6; color: #374151; }
.hidden { display: none !important; }
.loader { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); font-family: system-ui, sans-serif; }
.loader-content { text-align: center; color: var(--navy); }
.loader-icon { font-size: 40px; margin-bottom: 14px; }
.loader-text { font-weight: 700; font-size: 18px; }
.auth-screen { min-height: 100vh; display: flex; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.auth-left { flex: 1; background: linear-gradient(145deg, var(--navy) 0%, #1e4080 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; color: #fff; }
.auth-right { width: 440px; background: #fff; display: flex; flex-direction: column; justify-content: center; padding: 48px 44px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.page-title { margin: 0; font-size: 22px; font-weight: 800; color: #111; }
.page-subtitle { color: var(--gray); font-size: 13px; margin-top: 4px; }
.stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 5px rgba(0,0,0,0.07); border-top: 3px solid var(--blue); }
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 800; color: #111; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table thead tr { background: #F8FAFC; }
table th { padding: 10px 12px; text-align: left; font-weight: 700; color: #374151; font-size: 11px; border-bottom: 2px solid var(--border); text-transform: uppercase; letter-spacing: 0.04em; }
table td { padding: 11px 12px; border-bottom: 1px solid var(--border); }
table tbody tr:nth-child(even) { background: #FAFAFA; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-content { background: #fff; border-radius: 14px; padding: 32px; width: 100%; max-width: 620px; max-height: 92vh; overflow: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.25); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-title { margin: 0; font-size: 17px; font-weight: 800; color: var(--navy); }
.modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--gray); padding: 4px; line-height: 1; }
label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }

/* ============================================================
   QUOTE PREVIEW - matches the PDF exactly
   ============================================================ */
.quote-preview-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-start; justify-content: center;
  z-index: 2000; padding: 20px; overflow-y: auto;
}
.quote-preview-wrapper {
  background: #fff; width: 794px; min-height: 1000px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 9pt;
  color: #111;
  padding: 28px 32px 40px;
  position: relative;
}
/* --- Header row --- */
.qp-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 14px;
}
.qp-logo-area { display: flex; flex-direction: column; gap: 2px; }
.qp-logo-img { width: 90px; height: 90px; object-fit: contain; }
.qp-logo-text {
  font-size: 14pt; font-weight: 700; color: #c0392b;
  font-style: italic; margin-top: 4px;
}
.qp-contact-info { text-align: left; font-size: 8pt; align-self: flex-start; padding-top: 8px; }
.qp-contact-info strong { font-weight: 700; }
/* --- Title block --- */
.qp-title-block { margin: 10px 0 8px; }
.qp-title-block h1 { font-size: 20pt; font-weight: 900; letter-spacing: 0.06em; text-align: center; margin-bottom: 8px; }
.qp-meta { font-size: 8pt; line-height: 1.8; }
.qp-meta strong { font-weight: 700; }
/* --- Items table --- */
/* EXACT colours pixel-sampled from PDF:
   - Column header row:  #760014 maroon bg, #D0A95E golden text   (Qty/Description/Unit Price/Price)
   - Section rows:       #D0A95E  golden/amber bg, #000 BLACK text (CHURCH SETUP / RECEPTION / FLOWERS / LOGISTICS)
   - Subsection rows:    #D0A95E  same golden bg,  #000 BLACK text (TENT AND DÉCOR etc.)
   - Subtotal rows:      white bg, bold black
   - Grand total row:    #D0A95E  golden bg, #000 BLACK text       (TOTAL VAT INC.)
   - Terms header pill:  #8B1A1A  dark red pill, #fff WHITE italic
   - Terms bullet:       □  hollow square U+25A1
*/
.qp-table {
  width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 8pt;
}
/* Column header — dark maroon bg, golden text matching section row colour */
.qp-table th {
  background: #760014; color: #D0A95E; padding: 5px 7px;
  text-align: left; font-weight: 700; font-size: 8pt;
  border: 1px solid #5a000f;
}
.qp-table th:last-child, .qp-table th:nth-last-child(2) { text-align: right; }
.qp-table td {
  padding: 3px 7px; border: 1px solid #ccc; vertical-align: top;
}
.qp-table td:last-child, .qp-table td:nth-last-child(2) { text-align: right; white-space: nowrap; }
/* Section header row — golden/amber bg, BLACK text */
.qp-section-row td {
  background: #D0A95E; color: #000; font-weight: 700;
  padding: 4px 7px; font-size: 8pt; border: 1px solid #b8923f;
}
/* Subsection header row — same golden/amber bg, BLACK text */
.qp-subsection-row td {
  background: #D0A95E; color: #000; font-weight: 700;
  padding: 4px 7px; font-size: 8pt; border: 1px solid #b8923f;
}
/* Subtotal row */
.qp-subtotal-row td {
  font-weight: 700; background: #fff; color: #111;
  border: 1px solid #ccc; padding: 4px 7px;
}
/* Alternating rows */
.qp-table tbody tr.even td { background: #fafafa; }
/* Grand total block */
.qp-totals-table {
  width: 300px; margin-left: auto; margin-top: 8px; border-collapse: collapse;
  font-size: 9pt;
}
.qp-totals-table td { padding: 4px 8px; border: 1px solid #ccc; }
.qp-totals-table .total-label { font-weight: 700; }
/* Grand total row — golden bg, BLACK text */
.qp-totals-table .total-grand { font-weight: 900; font-size: 10pt; background: #D0A95E; color: #000; }
/* --- Terms box --- */
/* Dark red pill header, white italic text */
.qp-terms-header {
  display: inline-block !important; background: #8B1A1A !important;
  color: #fff !important; font-style: italic; font-weight: normal !important;
  padding: 3px 12px; font-size: 8.5pt; margin-top: 8px; border-radius: 3px;
  border: none !important; text-align: left !important; width: auto !important;
}
.qp-terms-list { margin-top: 6px; padding-left: 0; list-style: none; }
.qp-terms-list li {
  display: flex; gap: 8px; margin-bottom: 3px;
  font-size: 7.5pt; line-height: 1.5; color: #111; align-items: flex-start;
}
/* Hollow square □ — exact match for the PDF bullet */
.qp-terms-list li::before {
  content: "\25A1"; font-size: 9pt; flex-shrink: 0; line-height: 1.4;
  color: #111; font-family: Arial, sans-serif;
}
/* --- Signature --- */
.qp-signature { margin-top: 32px; font-size: 9pt; }
.qp-signature p { margin-bottom: 4px; }
.qp-sig-row { display: flex; gap: 80px; margin-top: 6px; align-items: flex-start; }
/* --- Print controls bar (screen only) --- */
.qp-controls {
  position: sticky; top: 0; background: #1B2F4E;
  display: flex; gap: 10px; padding: 10px 16px; z-index: 10;
  justify-content: flex-end; border-radius: 0 0 8px 8px;
  margin: -28px -32px 16px;
}
/* Never print the overlay or app shell — printing is handled via printQuote() */
@media print { body > * { display: none !important; } }

/* Cayan logo SVG fallback */
.cayan-logo-svg { width: 90px; height: 78px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const API_BASE = './api';

const API = {
  async request(endpoint, method = 'GET', body = null) {
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    const token = localStorage.getItem('auth_token');
    if (token) options.headers.Authorization = `Bearer ${token}`;
    if (body) options.body = JSON.stringify(body);
    try {
      const response = await fetch(`${API_BASE}/${endpoint}`, options);
      if (!response.ok && response.status === 401) {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('user');
        window.location.reload();
      }
      return await response.json();
    } catch (error) {
      console.error('API Error:', error);
      return { error: 'Network error' };
    }
  },
  auth: {
    login: (email, password) => API.request('auth/login', 'POST', { email, password }),
    register: (name, email, password) => API.request('auth/register', 'POST', { name, email, password }),
    verify: () => API.request('auth/verify'),
  },
  users: {
    getAll: () => API.request('users'),
    create: (user) => API.request('users', 'POST', user),
    update: (id, user) => API.request(`users/${id}`, 'PUT', user),
    delete: (id) => API.request(`users/${id}`, 'DELETE'),
  },
  company: {
    get: () => API.request('company'),
    save: (company) => API.request('company', 'POST', company),
  },
  catalog: {
    getAll: () => API.request('catalog'),
    get: (id) => API.request(`catalog/${id}`),
    create: (item) => API.request('catalog', 'POST', item),
    update: (id, item) => API.request(`catalog/${id}`, 'PUT', item),
    delete: (id) => API.request(`catalog/${id}`, 'DELETE'),
  },
  clients: {
    getAll: () => API.request('clients'),
    get: (id) => API.request(`clients/${id}`),
    create: (client) => API.request('clients', 'POST', client),
    update: (id, client) => API.request(`clients/${id}`, 'PUT', client),
    delete: (id) => API.request(`clients/${id}`, 'DELETE'),
  },
  quotes: {
    getAll: () => API.request('quotes'),
    get: (id) => API.request(`quotes/${id}`),
    create: (quote) => API.request('quotes', 'POST', quote),
    update: (id, quote) => API.request(`quotes/${id}`, 'PUT', quote),
    delete: (id) => API.request(`quotes/${id}`, 'DELETE'),
  },
  stats: { get: () => API.request('stats') }
};

const helpers = {
  formatDate: (dateStr) => {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
  },
  formatMoney: (amount, currency = 'KES') =>
    `${currency} ${Number(amount || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
  fmt: (n) => Number(n || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
  today: () => new Date().toISOString().slice(0, 10),
  addDays: (date, days) => { const r = new Date(date); r.setDate(r.getDate() + days); return r.toISOString().slice(0, 10); },
};

// ─── Quote preview renderer ───────────────────────────────────────────────────
// Renders a quote in the exact layout of the Cayan Events Ke. PDF template.
// The quote object shape mirrors what the API returns:
//   { number, quote_date, valid_until, client_name, client_company, venue,
//     no_of_guests, contact_person, subtotal, vat_rate, vat_amount, total,
//     notes, items: [{ section, subsection, name, qty, unit_price, price }] }
// Sections and subsections are colour-coded rows (maroon / dark).

function renderCayanLogo() {
  // Inline SVG approximation of the Cayan crescent/feather logo
  return `<svg class="cayan-logo-svg" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gld" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#d4af37"/>
        <stop offset="100%" stop-color="#8B6914"/>
      </radialGradient>
    </defs>
    <!-- Outer crescent arc -->
    <path d="M60,10 C30,10 10,35 10,60 C10,85 30,100 60,100 C45,85 38,72 38,60 C38,48 45,32 60,10 Z"
          fill="url(#gld)" opacity="0.85"/>
    <!-- Inner decorative feathers/leaves -->
    <ellipse cx="72" cy="38" rx="18" ry="6" fill="#c9a227" transform="rotate(-35 72 38)" opacity="0.9"/>
    <ellipse cx="78" cy="55" rx="18" ry="5" fill="#b8941e" transform="rotate(-10 78 55)" opacity="0.8"/>
    <ellipse cx="74" cy="72" rx="16" ry="5" fill="#c9a227" transform="rotate(20 74 72)" opacity="0.75"/>
    <!-- Centre stem -->
    <line x1="60" y1="10" x2="60" y2="100" stroke="#8B6914" stroke-width="1.5" opacity="0.5"/>
  </svg>`;
}

function groupItemsBySection(items) {
  // items: [{ section, subsection?, name, qty, unit_price, price }]
  const groups = [];
  let currentSection = null;
  let currentSubsection = null;

  for (const item of items) {
    if (item.section && item.section !== currentSection) {
      currentSection = item.section;
      currentSubsection = null;
      groups.push({ type: 'section', label: item.section });
    }
    if (item.subsection && item.subsection !== currentSubsection) {
      currentSubsection = item.subsection;
      groups.push({ type: 'subsection', label: item.subsection });
    }
    if (item.subtotal_label) {
      groups.push({ type: 'subtotal', label: item.subtotal_label, amount: item.price });
    } else {
      groups.push({ type: 'item', item });
    }
  }
  return groups;
}

function renderQuotePreviewHTML(quote, company) {
  const c = company || {};
  const phone = c.phone || '0737 611 658';
  const email = c.email || 'cayaneventsanddecor@gmail.com';
  const address = c.address || 'Mokoyeti West Road, Karen';
  const companyName = c.name || 'Cayan Events Ke.';
  const logo = c.logo || null; // base64
  const currency = c.currency || 'KES';
  const vatRate = Number(quote.vat_rate || 16);
  const subtotal = Number(quote.subtotal || 0);
  const vatAmount = Number(quote.vat_amount || (subtotal * vatRate / 100));
  const total = Number(quote.total || (subtotal + vatAmount));
  const items = quote.items || [];
  const groups = groupItemsBySection(items);

  // Build table rows
  let rowHtml = '';
  let rowIdx = 0;
  for (const g of groups) {
    if (g.type === 'section') {
      rowHtml += `<tr class="qp-section-row"><td></td><td colspan="3" style="text-align:left;">${g.label}</td></tr>`;
      rowIdx = 0;
    } else if (g.type === 'subsection') {
      rowHtml += `<tr class="qp-subsection-row"><td></td><td colspan="3" style="text-align:left;">${g.label}</td></tr>`;
      rowIdx = 0;
    } else if (g.type === 'subtotal') {
      rowHtml += `<tr class="qp-subtotal-row">
        <td colspan="2"></td>
        <td>${g.label}</td>
        <td>${helpers.fmt(g.amount)}</td>
      </tr>`;
    } else if (g.type === 'item') {
      const it = g.item;
      const evenClass = rowIdx % 2 === 0 ? '' : 'even';
      rowIdx++;
      rowHtml += `<tr class="${evenClass}">
        <td style="text-align:center;">${it.qty || ''}</td>
        <td>${it.name || ''}</td>
        <td>${it.unit_price ? helpers.fmt(it.unit_price) : ''}</td>
        <td>${it.price ? helpers.fmt(it.price) : ''}</td>
      </tr>`;
    }
  }

  const logoHtml = logo
    ? `<img src="${logo}" alt="Logo" class="qp-logo-img"/>`
    : renderCayanLogo();

  return `
  <div class="qp-controls">
    <button onclick="printQuote(window.__currentQuote, window.__currentCompany)" style="background:#2563EB;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">🖨 Print / Save PDF</button>
    <button onclick="document.querySelector('.quote-preview-overlay').remove()" style="background:#374151;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">✕ Close</button>
  </div>

  <!-- ── HEADER ── -->
  <div class="qp-header">
    <div class="qp-logo-area">
      ${logoHtml}
      <div class="qp-logo-text">${companyName}</div>
    </div>
    <div class="qp-contact-info">
      <table style="border:none;border-collapse:collapse;font-size:8pt;line-height:1.6;">
        <tr>
          <td style="font-weight:700;padding:0 3px 0 0;white-space:nowrap;">Phone:</td>
          <td style="padding:0;white-space:nowrap;">${phone}</td>
        </tr>
        <tr>
          <td style="font-weight:700;padding:0 3px 0 0;white-space:nowrap;">E-mail:</td>
          <td style="padding:0;text-decoration:underline;color:#000;white-space:nowrap;">${email}</td>
        </tr>
        <tr>
          <td style="font-weight:700;padding:0 3px 0 0;white-space:nowrap;">Address</td>
          <td style="padding:0;white-space:nowrap;">${address}</td>
        </tr>
      </table>
    </div>
  </div>

  <!-- ── TITLE + META ── -->
  <div class="qp-title-block">
    <h1>QUOTATION</h1>
    <div class="qp-meta">
      <div><strong>Statement No :</strong> ${quote.number || ''}</div>
      <div><strong>Bill to:</strong> ${quote.client_name || ''}</div>
      <div><strong>Venue:</strong> ${quote.venue || 'NAIROBI'}</div>
      <div><strong>No of Guests:</strong> ${quote.no_of_guests || ''}</div>
      <div><strong>Date:</strong> ${quote.quote_date ? helpers.formatDate(quote.quote_date) : ''}</div>
      <div><strong>Contact Person:</strong> ${quote.contact_person || quote.client_name || ''}</div>
    </div>
  </div>

  <!-- ── ITEMS TABLE ── -->
  <table class="qp-table">
    <thead>
      <tr>
        <th style="width:8%;">Qty</th>
        <th style="width:56%;">Description</th>
        <th style="width:18%;">Unit Price</th>
        <th style="width:18%;">Price</th>
      </tr>
    </thead>
    <tbody>
      ${rowHtml}
    </tbody>
  </table>

  <!-- ── TOTALS ── -->
  <table class="qp-totals-table">
    <tr>
      <td colspan="2" style="border-top:2px solid #bbb;"></td>
    </tr>
    <tr>
      <td class="total-label" style="font-weight:700;">TOTAL</td>
      <td style="text-align:right;font-weight:700;">${helpers.fmt(subtotal)}</td>
    </tr>
    <tr>
      <td>VAT ${vatRate}%</td>
      <td style="text-align:right;">${helpers.fmt(vatAmount)}</td>
    </tr>
    <tr class="total-grand">
      <td style="padding:5px 8px;">TOTAL VAT INC.</td>

  <div class="qp-signature">

  <div style="text-align:center;font-size:7pt;color:#aaa;margin-top:24px;">Page 1</div>
  `;

function showQuotePreview(quote, company) {
  // Remove any existing overlay
  const existing = document.querySelector('.quote-preview-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'quote-preview-overlay';

  const wrapper = document.createElement('div');
  wrapper.className = 'quote-preview-wrapper';
  wrapper.innerHTML = renderQuotePreviewHTML(quote, company);

  window.__currentQuote = quote;
  window.__currentCompany = company;
  overlay.appendChild(wrapper);
  document.body.appendChild(overlay);

  // Close on backdrop click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
}

// ─── App State ────────────────────────────────────────────────────────────────
const app = {
  state: {
    page: 'auth', authMode: 'login',
    user: JSON.parse(localStorage.getItem('user')) || null,
    view: 'dashboard', loading: true, toast: null,
    company: {}, catalog: [], clients: [], quotes: [], users: [],
    editQuote: null,
  },

  notify(msg, type = 'success') {
    this.state.toast = { msg, type };
    this.render();
    setTimeout(() => { this.state.toast = null; this.render(); }, 3200);
  },
  setView(view) { this.state.view = view; this.render(); },

  async handleLogin(email, password) {
    const result = await API.auth.login(email, password);
    if (result.success) {
      localStorage.setItem('auth_token', result.token);
      localStorage.setItem('user', JSON.stringify(result.user));
      this.state.user = result.user;
      this.state.page = 'app';
      this.loadAppData();
      this.render();
    } else { this.notify(result.error, 'error'); }
  },

  async handleRegister(name, email, password) {
    const result = await API.auth.register(name, email, password);
    if (result.success) {
      this.notify(result.message, 'success');
      this.state.authMode = 'login';
      this.render();
    } else { this.notify(result.error, 'error'); }
  },

  handleLogout() {
    localStorage.removeItem('auth_token');
    localStorage.removeItem('user');
    this.state.user = null;
    this.state.page = 'auth';
    this.state.view = 'dashboard';
    this.render();
  },

  async loadAppData() {
    const [company, catalog, clients, quotes, stats] = await Promise.all([
      API.company.get(), API.catalog.getAll(), API.clients.getAll(),
      API.quotes.getAll(), API.stats.get(),
    ]);
    this.state.company = company || {};
    this.state.catalog = catalog || [];
    this.state.clients = clients || [];
    this.state.quotes = quotes || [];
    this.state.stats = stats || {};
    this.state.loading = false;
    this.render();
  },

  render() {
    const el = document.getElementById('app');

      el.innerHTML = `<div class="loader"><div class="loader-content"><div class="loader-icon">📋</div><div class="loader-text">Loading QuoteSystem...</div></div></div>`;

    if (this.state.page === 'auth') {

    } else {
      el.innerHTML = this.renderAppShell();

    if (this.state.toast) {
      const t = document.createElement('div');
      t.className = `toast ${this.state.toast.type}`;
      t.innerHTML = `${this.state.toast.type === 'success' ? '✓' : '⚠'} ${this.state.toast.msg}`;

  },

  calcNewQuoteTotals() {
    const vatRate = parseFloat(document.getElementById('nq-vat')?.value || 16) / 100;
    let subtotal = 0;
    document.querySelectorAll('.nq-row[data-type="item"]').forEach(row => {
      const qty = parseFloat(row.querySelector('.nq-qty')?.value || 0);
      const up = parseFloat(row.querySelector('.nq-unit-price')?.value || 0);
      const amount = qty * up;
      const priceDisplay = row.querySelector('.nq-price-display');
      if (priceDisplay) priceDisplay.value = amount > 0 ? amount.toFixed(2) : '';
      subtotal += amount;
    });
    const vatAmt = subtotal * vatRate;
    const total = subtotal + vatAmt;
    const curr = this.state.company.currency || 'KES';
    const el = (id) => document.getElementById(id);
    if (el('nq-subtotal')) el('nq-subtotal').textContent = helpers.formatMoney(subtotal, curr);
    if (el('nq-vat-pct')) el('nq-vat-pct').textContent = (vatRate * 100).toFixed(0);
    if (el('nq-vat-amt')) el('nq-vat-amt').textContent = helpers.formatMoney(vatAmt, curr);
    if (el('nq-total')) el('nq-total').textContent = helpers.formatMoney(total, curr);
    return { subtotal, vatRate: vatRate * 100, vatAmount: vatAmt, total };
  },

  collectNewQuoteData() {
    const clientSel = document.getElementById('nq-client');
    const clientOpt = clientSel?.selectedOptions[0];
    const clientId = clientSel?.value;
    const clientName = clientOpt?.dataset.name || '';
    const contactPerson = document.getElementById('nq-contact')?.value || clientOpt?.dataset.contact || clientName;
    const venue = document.getElementById('nq-venue')?.value || '';
    const noOfGuests = document.getElementById('nq-guests')?.value || '';
    const quoteDate = document.getElementById('nq-date')?.value || helpers.today();
    const { subtotal, vatRate, vatAmount, total } = this.calcNewQuoteTotals();

    const items = [];
    document.querySelectorAll('.nq-row').forEach(row => {
      const type = row.dataset.type;
      if (type === 'section') {
        const sectionType = row.querySelector('.nq-section-type')?.value || 'section';
        const label = row.querySelector('.nq-section-name')?.value || '';
        items.push({ [sectionType]: label });
      } else {
        const qty = parseFloat(row.querySelector('.nq-qty')?.value || 0);
        const name = row.querySelector('.nq-name')?.value || '';
        const unit_price = parseFloat(row.querySelector('.nq-unit-price')?.value || 0);
        const price = qty * unit_price;
        if (name || qty) items.push({ name, qty, unit_price, price });
      }
    });

    return {
      client_id: clientId,
      client_name: clientName,
      venue, no_of_guests: noOfGuests,
      contact_person: contactPerson,
      quote_date: quoteDate,
      vat_rate: vatRate,
      vat_amount: vatAmount,
      subtotal, total,
      items,
    };
  },

  buildPreviewQuote(data) {
    // Convert flat items array (with section/subsection keys) to the groups format
    const previewItems = [];
    for (const it of (data.items || [])) {
      if (it.section) { previewItems.push({ section: it.section }); }
      else if (it.subsection) { previewItems.push({ subsection: it.subsection }); }
      else { previewItems.push(it); }
    }
    return { ...data, items: previewItems };
  },

  renderCatalog() {
    const items = this.state.catalog || [];
    return `<div style="max-width:900px;">
      <div class="page-header">
        <div><h2 class="page-title">Catalog</h2><p class="page-subtitle">${items.length} items</p></div>
        <button class="button" id="cat-add-btn">+ Add Item</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>Name</th><th>Category</th><th>Unit</th><th>Actions</th></tr></thead>
          <tbody>${items.length ? items.map(i => `<tr><td>${i.name}</td><td>${i.category||''}</td><td>${i.unit||''}</td><td><button class="button red" style="padding:4px 10px;font-size:11px;" data-del-catalog="${i.id}">Delete</button></td></tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--gray);padding:20px;">No catalog items yet.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  },

  renderClients() {
    const clients = this.state.clients || [];
    return `<div style="max-width:900px;">
      <div class="page-header">
        <div><h2 class="page-title">Clients</h2><p class="page-subtitle">${clients.length} clients</p></div>
        <button class="button" id="cli-add-btn">+ Add Client</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Contact Person</th><th>Actions</th></tr></thead>
          <tbody>${clients.length ? clients.map(c => `<tr><td>${c.name}</td><td>${c.email||''}</td><td>${c.phone||''}</td><td>${c.contact_person||''}</td><td><button class="button red" style="padding:4px 10px;font-size:11px;" data-del-client="${c.id}">Delete</button></td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--gray);padding:20px;">No clients yet.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  },

  renderUsers() {
    const users = this.state.users || [];
    return `<div style="max-width:900px;">
      <div class="page-header">
        <div><h2 class="page-title">Users</h2></div>
        <button class="button" id="usr-add-btn">+ Add User</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
          <tbody>${users.length ? users.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td>${u.verified?'✅ Verified':'⏳ Pending'}</td></tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--gray);padding:20px;">No users.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  },

  renderSettings() {
    const c = this.state.company || {};
    return `<div style="max-width:700px;">
      <div class="page-header">
        <div><h2 class="page-title">Company Settings</h2></div>
      </div>
      <div class="card">
        <div class="form-grid">
          <div class="form-group full"><label>Company Name</label><input type="text" id="set-name" class="input-field" value="${c.name||''}" placeholder="Cayan Events Ke."></div>
          <div class="form-group"><label>Phone</label><input type="text" id="set-phone" class="input-field" value="${c.phone||''}" placeholder="0737 611 658"></div>
          <div class="form-group"><label>Email</label><input type="email" id="set-email" class="input-field" value="${c.email||''}" placeholder="info@example.com"></div>
          <div class="form-group full"><label>Address</label><input type="text" id="set-address" class="input-field" value="${c.address||''}" placeholder="Mokoyeti West Road, Karen"></div>
          <div class="form-group"><label>Currency</label><input type="text" id="set-currency" class="input-field" value="${c.currency||'KES'}" placeholder="KES"></div>
          <div class="form-group full"><label>Terms &amp; Conditions</label><textarea id="set-terms" class="input-field" rows="5" placeholder="Your standard terms...">${c.terms||''}</textarea></div>
          <div class="form-group full">
            <label>Company Logo (JPEG / PNG)</label>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
              <input type="file" id="set-logo-file" accept="image/jpeg,image/png,image/gif,image/webp"
                style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:#fff;cursor:pointer;">
              ${c.logo ? '<img src="' + c.logo + '" alt="Current logo" style="height:60px;width:auto;border:1px solid var(--border);border-radius:6px;padding:4px;object-fit:contain;">' : '<span style="color:var(--gray);font-size:12px;">No logo uploaded yet</span>'}
            </div>
            <p style="font-size:11px;color:var(--gray);margin:4px 0 0;">Upload a JPEG or PNG. Recommended: transparent background, square crop.</p>
          </div>
        </div>
        <button class="button green" id="set-save-btn">💾 Save Settings</button>
      </div>
    </div>`;
  },

  // ── Modal helper ────────────────────────────────────────────────────────────
  showModal(title, bodyHtml, onConfirm, confirmLabel = 'Save') {
    const existing = document.getElementById('app-modal');
    if (existing) existing.remove();
    const m = document.createElement('div');
    m.id = 'app-modal';
    m.className = 'modal';
    m.innerHTML = `
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="modal-title">${title}</h3>
          <button class="modal-close" id="modal-close-btn">✕</button>
        </div>
        <div id="modal-body">${bodyHtml}</div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
          <button class="button secondary" id="modal-cancel-btn">Cancel</button>
          <button class="button green" id="modal-confirm-btn">${confirmLabel}</button>
        </div>
      </div>`;
    document.body.appendChild(m);
    const close = () => m.remove();
    document.getElementById('modal-close-btn').onclick = close;
    document.getElementById('modal-cancel-btn').onclick = close;
    document.getElementById('modal-confirm-btn').onclick = () => onConfirm(m, close);
    m.addEventListener('click', (e) => { if (e.target === m) close(); });
  },

  bindEvents() {
    // ── Auth ──────────────────────────────────────────────────────────────────
    document.querySelectorAll('.auth-mode-btn').forEach(b => b.addEventListener('click', (e) => {
      this.state.authMode = e.target.dataset.mode; this.render();
    }));
    document.getElementById('auth-submit')?.addEventListener('click', async () => {
      const email = document.getElementById('auth-email')?.value;
      const password = document.getElementById('auth-password')?.value;
      if (this.state.authMode === 'login') {
        if (!email || !password) { this.notify('Enter email and password', 'error'); return; }
        await this.handleLogin(email, password);
      } else {
        const name = document.getElementById('reg-name')?.value;
        if (!name || !email || !password) { this.notify('All fields required', 'error'); return; }
        await this.handleRegister(name, email, password);
      }
    });

    // ── Nav ───────────────────────────────────────────────────────────────────
    document.querySelectorAll('.nav-item').forEach(b =>
      b.addEventListener('click', (e) => this.setView(e.currentTarget.dataset.view)));
    document.getElementById('logout-btn')?.addEventListener('click', () => this.handleLogout());

    // ── Quote preview buttons ─────────────────────────────────────────────────
    document.querySelectorAll('[data-preview-quote]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.currentTarget.dataset.previewQuote;
        const quote = await API.quotes.get(id);
        if (!quote.created_by) quote.created_by = this.state.user?.name || '';
        showQuotePreview(quote, this.state.company);
      });
    });

    // ── New Quote ─────────────────────────────────────────────────────────────
    if (document.getElementById('nq-items-container')) {
      // Single persistent delegated listener on the container for row events
      const nqContainer = document.getElementById('nq-items-container');
      nqContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('nq-remove-row')) {
          e.target.closest('.nq-row')?.remove();
          this.calcNewQuoteTotals();
        }
      });
      nqContainer.addEventListener('input', (e) => {
        if (e.target.classList.contains('nq-qty') || e.target.classList.contains('nq-unit-price')) {
          this.calcNewQuoteTotals();
        }
      });
      nqContainer.addEventListener('change', (e) => {
        if (e.target.classList.contains('nq-section-type')) {
          const input = e.target.closest('.nq-row')?.querySelector('.nq-section-name');
          if (input) input.style.background = e.target.value === 'subsection' ? '#2c2c2c' : '#8B1A1A';
        }
      });

      document.getElementById('nq-vat')?.addEventListener('input', () => this.calcNewQuoteTotals());

      // ── Catalog search filter ──────────────────────────────────────────────
      document.getElementById('nq-catalog-search')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const sel = document.getElementById('nq-catalog-select');
        if (!sel) return;
        Array.from(sel.options).forEach(opt => {
          if (opt.value === '') return;
          opt.hidden = !!(q && !opt.text.toLowerCase().includes(q));
        });
        const visible = Array.from(sel.options).filter(o => o.value && !o.hidden);
        if (visible.length === 1) sel.value = visible[0].value;
      });

      // ── Add from catalog ───────────────────────────────────────────────────
      let rowIdx = 1;
      document.getElementById('nq-catalog-add-btn')?.addEventListener('click', () => {
        const sel = document.getElementById('nq-catalog-select');
        const qtyInput = document.getElementById('nq-catalog-qty');
        if (!sel || !sel.value) { app.notify('Pick a catalog item first', 'error'); return; }
        const opt = sel.selectedOptions[0];
        const qty = parseFloat(qtyInput?.value || 1);
        const unitPrice = parseFloat(opt.dataset.price || 0);
        const container = document.getElementById('nq-items-container');
        container.insertAdjacentHTML('beforeend', app.renderNewQuoteItemRow(rowIdx++, 'item', {
          name: opt.dataset.name || opt.text,
          qty,
          price: unitPrice,
        }));
        app.calcNewQuoteTotals();
        sel.value = '';
        if (qtyInput) qtyInput.value = 1;
        const searchEl = document.getElementById('nq-catalog-search');
        if (searchEl) { searchEl.value = ''; }
        Array.from(sel.options).forEach(o => o.hidden = false);
      });

      document.getElementById('nq-add-item')?.addEventListener('click', () => {
        document.getElementById('nq-items-container').insertAdjacentHTML('beforeend', this.renderNewQuoteItemRow(rowIdx++));
      });
      document.getElementById('nq-add-section')?.addEventListener('click', () => {
        document.getElementById('nq-items-container').insertAdjacentHTML('beforeend', this.renderNewQuoteItemRow(rowIdx++, 'section'));
      });
      document.getElementById('nq-client')?.addEventListener('change', (e) => {
        const opt = e.target.selectedOptions[0];
        const cp = document.getElementById('nq-contact');
        if (cp && opt) cp.value = opt.dataset.contact || '';
      });
      document.getElementById('nq-preview-btn')?.addEventListener('click', () => {
        this.calcNewQuoteTotals();
        const data = this.collectNewQuoteData();
        const preview = this.buildPreviewQuote(data);
        preview.number = 'PREVIEW';
        preview.created_by = this.state.user?.name || '';
        showQuotePreview(preview, this.state.company);
      });
      document.getElementById('nq-save-btn')?.addEventListener('click', async () => {
        this.calcNewQuoteTotals();
        const data = this.collectNewQuoteData();
        if (!data.client_id) { this.notify('Please select a client', 'error'); return; }
        const result = await API.quotes.create(data);
        if (result.id || result.success) {
          this.notify('Quote saved!', 'success');
          await this.loadAppData();
          this.state.view = 'quotes';
          this.render();
        } else { this.notify(result.error || 'Failed to save quote', 'error'); }
      });
      this.calcNewQuoteTotals();
    }

    // ── Catalog ───────────────────────────────────────────────────────────────
    document.getElementById('cat-add-btn')?.addEventListener('click', () => {
      this.showModal('Add Catalog Item', `
        <div class="form-grid">
          <div class="form-group full"><label>Name</label><input id="cat-name" class="input-field" placeholder="Item name" style="margin:0;"></div>
          <div class="form-group"><label>Category</label><input id="cat-category" class="input-field" placeholder="e.g. Tents, Flowers" style="margin:0;"></div>
          <div class="form-group"><label>Unit</label><input id="cat-unit" class="input-field" placeholder="e.g. pcs, day, hr" style="margin:0;"></div>
          <div class="form-group full"><label>Description</label><textarea id="cat-desc" class="input-field" rows="2" placeholder="Optional description" style="margin:0;"></textarea></div>
        </div>`, async (modal, close) => {
        const name = document.getElementById('cat-name')?.value?.trim();
        if (!name) { this.notify('Name is required', 'error'); return; }
        const result = await API.catalog.create({
          name,
          category: document.getElementById('cat-category')?.value,
          unit: document.getElementById('cat-unit')?.value,
          description: document.getElementById('cat-desc')?.value,
        });
        if (result.id || result.success) {
          this.notify('Item added!');
          close();
          await this.loadAppData();
          this.state.view = 'catalog';
          this.render();
        } else { this.notify(result.error || 'Failed to add item', 'error'); }
      });
    });

    document.querySelectorAll('[data-del-catalog]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.currentTarget.dataset.delCatalog;
        if (!confirm('Delete this catalog item?')) return;
        await API.catalog.delete(id);
        this.notify('Item deleted');
        await this.loadAppData();
        this.state.view = 'catalog';
        this.render();
      });
    });

    // ── Clients ───────────────────────────────────────────────────────────────
    document.getElementById('cli-add-btn')?.addEventListener('click', () => {
      this.showModal('Add Client', `
        <div class="form-grid">
          <div class="form-group full"><label>Client / Company Name</label><input id="cli-name" class="input-field" placeholder="e.g. Joan Langat" style="margin:0;"></div>
          <div class="form-group"><label>Email</label><input id="cli-email" class="input-field" type="email" placeholder="client@email.com" style="margin:0;"></div>
          <div class="form-group"><label>Phone</label><input id="cli-phone" class="input-field" placeholder="e.g. 0700 000 000" style="margin:0;"></div>
          <div class="form-group"><label>Contact Person</label><input id="cli-contact" class="input-field" placeholder="Contact person name" style="margin:0;"></div>
          <div class="form-group"><label>Address</label><input id="cli-address" class="input-field" placeholder="Address" style="margin:0;"></div>
        </div>`, async (modal, close) => {
        const name = document.getElementById('cli-name')?.value?.trim();
        if (!name) { this.notify('Client name is required', 'error'); return; }
        const result = await API.clients.create({
          name,
          email: document.getElementById('cli-email')?.value,
          phone: document.getElementById('cli-phone')?.value,
          contact_person: document.getElementById('cli-contact')?.value,
          address: document.getElementById('cli-address')?.value,
        });
        if (result.id || result.success) {
          this.notify('Client added!');
          close();
          await this.loadAppData();
          this.state.view = 'clients';
          this.render();
        } else { this.notify(result.error || 'Failed to add client', 'error'); }
      });
    });

    document.querySelectorAll('[data-del-client]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.currentTarget.dataset.delClient;
        if (!confirm('Delete this client?')) return;
        await API.clients.delete(id);
        this.notify('Client deleted');
        await this.loadAppData();
        this.state.view = 'clients';
        this.render();
      });
    });

    // ── Users (admin only) ────────────────────────────────────────────────────
    document.getElementById('usr-add-btn')?.addEventListener('click', () => {
      this.showModal('Add User', `
        <div class="form-grid">
          <div class="form-group full"><label>Full Name</label><input id="usr-name" class="input-field" placeholder="Full name" style="margin:0;"></div>
          <div class="form-group"><label>Email</label><input id="usr-email" class="input-field" type="email" placeholder="user@email.com" style="margin:0;"></div>
          <div class="form-group"><label>Password</label><input id="usr-pass" class="input-field" type="password" placeholder="Min. 6 characters" style="margin:0;"></div>
          <div class="form-group"><label>Role</label>
            <select id="usr-role" class="input-field" style="margin:0;">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;">
            <input type="checkbox" id="usr-verified" style="width:16px;height:16px;">
            <label style="text-transform:none;letter-spacing:0;font-size:13px;margin:0;">Mark as verified</label>
          </div>
        </div>`, async (modal, close) => {
        const name = document.getElementById('usr-name')?.value?.trim();
        const email = document.getElementById('usr-email')?.value?.trim();
        const password = document.getElementById('usr-pass')?.value;
        if (!name || !email || !password) { this.notify('All fields required', 'error'); return; }
        if (password.length < 6) { this.notify('Password must be at least 6 characters', 'error'); return; }
        const result = await API.users.create({
          name, email, password,
          role: document.getElementById('usr-role')?.value || 'user',
          verified: document.getElementById('usr-verified')?.checked ? 1 : 0,
        });
        if (result.id || result.success) {
          this.notify('User created!');
          close();
          const users = await API.users.getAll();
          this.state.users = users || [];
          this.state.view = 'users';
          this.render();
        } else { this.notify(result.error || 'Failed to create user', 'error'); }
      });
    });

    // ── Settings ──────────────────────────────────────────────────────────────
    document.getElementById('set-save-btn')?.addEventListener('click', async () => {
      const fileInput = document.getElementById('set-logo-file');
      const file = fileInput?.files?.[0];

      const saveCompany = async (logoData) => {
        const company = {
          name:     document.getElementById('set-name')?.value,
          phone:    document.getElementById('set-phone')?.value,
          email:    document.getElementById('set-email')?.value,
          address:  document.getElementById('set-address')?.value,
          currency: document.getElementById('set-currency')?.value,
          terms:    document.getElementById('set-terms')?.value,
          logo:     logoData !== undefined ? logoData : (this.state.company.logo || ''),
        };
        const result = await API.company.save(company);
        if (result.success) {
          this.state.company = { ...this.state.company, ...company };
          this.notify('Settings saved!');
          this.render();
        } else { this.notify(result.error || 'Failed to save', 'error'); }
      };

      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => saveCompany(e.target.result);
        reader.onerror = () => { this.notify('Failed to read logo file', 'error'); };
        reader.readAsDataURL(file);
      } else {
        saveCompany(undefined);
      }
    });
  },

  // kept for compatibility but no longer needed for delegation
  bindNewQuoteRowEvents() {}
};

// Boot
window.addEventListener('load', async () => {
  const token = localStorage.getItem('auth_token');
  if (token) {
    const verified = await API.auth.verify();
    if (verified.valid) {
      app.state.user = verified.user;
      app.state.page = 'app';
      app.loadAppData();
    } else { app.state.loading = false; app.render(); }
  } else { app.state.loading = false; app.render(); }
});
</script>
</body>
</html>
