<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteSystem - Quote Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1B2F4E;
            --navy-light: #243d62;
            --blue: #2563EB;
            --blue-hover: #1D4ED8;
            --green: #059669;
            --red: #DC2626;
            --amber: #D97706;
            --gray: #6B7280;
            --border: #E5E7EB;
            --bg: #F0F4F8;
            --white: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #111;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 22px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .sidebar-header .logo {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .sidebar-header .company-name {
            font-weight: 700;
            font-size: 14px;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .sidebar-header .user-name {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            margin-top: 6px;
        }

        .sidebar-header .role-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            margin-top: 4px;
            letter-spacing: 0.06em;
        }

        .sidebar nav {
            flex: 1;
            padding: 10px 0;
            overflow-y: auto;
        }

        .nav-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border: none;
            border-left: 3px solid transparent;
            background: transparent;
            color: rgba(255, 255, 255, 0.55);
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-item.active {
            border-left-color: #60A5FA;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.15s;
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 12px 22px;
            border-radius: 9px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
            animation: slideIn 0.3s ease-out;
        }

        .toast.success {
            background: var(--green);
        }

        .toast.error {
            background: var(--red);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.07);
            padding: 24px;
            margin-bottom: 14px;
        }

        .input-field {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: #fff;
            color: #111;
            margin-bottom: 12px;
        }

        .button {
            padding: 9px 18px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .button:hover {
            background: var(--blue-hover);
        }

        .button.navy {
            background: var(--navy);
        }

        .button.green {
            background: var(--green);
        }

        .button.red {
            background: var(--red);
        }

        .button.secondary {
            background: #F3F4F6;
            color: #374151;
        }

        .hidden {
            display: none !important;
        }

        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg);
            font-family: system-ui, sans-serif;
        }

        .loader-content {
            text-align: center;
            color: var(--navy);
        }

        .loader-icon {
            font-size: 40px;
            margin-bottom: 14px;
        }

        .loader-text {
            font-weight: 700;
            font-size: 18px;
        }

        .auth-screen {
            min-height: 100vh;
            display: flex;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .auth-left {
            flex: 1;
            background: linear-gradient(145deg, var(--navy) 0%, #1e4080 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #fff;
        }

        .auth-right {
            width: 440px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 44px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .page-title {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            color: #111;
        }

        .page-subtitle {
            color: var(--gray);
            font-size: 13px;
            margin-top: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.07);
            border-top: 3px solid var(--blue);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: #111;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table thead tr {
            background: #F8FAFC;
        }

        table th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 700;
            color: #374151;
            font-size: 11px;
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        table td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
        }

        table tbody tr:nth-child(even) {
            background: #FAFAFA;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            border-radius: 14px;
            padding: 32px;
            width: 100%;
            max-width: 620px;
            max-height: 92vh;
            overflow: auto;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .modal-title {
            margin: 0;
            font-size: 17px;
            font-weight: 800;
            color: var(--navy);
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--gray);
            padding: 4px;
            line-height: 1;
        }

        .text-center {
            text-align: center;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .quote-layout {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .quote-section {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .quote-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 1px 12px rgba(0, 0, 0, 0.08);
            padding: 20px;
        }

        .quote-preview {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            min-height: 680px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fff;
        }

        .quote-preview .quote-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .quote-branding {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .quote-logo {
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
            background: #f8fafc;
            border-radius: 50%;
            font-size: 26px;
            font-weight: 800;
            color: var(--navy);
        }

        .quote-contact {
            text-align: right;
            font-size: 12px;
            color: #4B5563;
            line-height: 1.5;
        }

        .quote-top-details {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            padding: 18px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .quote-top-details div {
            font-size: 12px;
            color: #374151;
            line-height: 1.6;
        }

        .quote-top-details strong {
            display: block;
            font-weight: 700;
            color: #111;
            margin-bottom: 6px;
        }

        .quote-preview table.quote-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 12px;
        }

        .quote-preview table.quote-table th,
        .quote-preview table.quote-table td {
            padding: 10px 12px;
            border: 1px solid var(--border);
        }

        .quote-preview table.quote-table th {
            background: #7C2D12;
            color: #fff;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.08em;
        }

        .quote-preview table.quote-table td {
            color: #374151;
            vertical-align: top;
        }

        .quote-table-section-row td {
            background: #7C2D12;
            color: #fff;
            font-weight: 700;
            padding: 10px 12px;
        }

        .quote-preview .quote-summary {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: start;
        }

        .quote-preview .quote-summary .quote-total {
            display: grid;
            gap: 8px;
            min-width: 240px;
        }

        .quote-preview .quote-summary .quote-total div {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #374151;
        }

        .quote-preview .quote-summary .quote-total div strong {
            color: #111;
        }

        .quote-terms-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: #111;
            text-transform: uppercase;
            font-size: 12px;
        }

        .quote-preview .quote-footer {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            font-size: 12px;
            color: #4B5563;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .quote-preview .quote-footer div {
            margin-bottom: 8px;
        }

        .quote-preview .quote-signature {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            margin-top: 10px;
        }

        .quote-preview .quote-signature-date {
            margin-top: 4px;
            font-size: 12px;
            color: #4B5563;
        }

        .quote-preview .quote-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .quote-preview .quote-actions .button {
            padding: 10px 18px;
        }

        .quote-preview .quote-header {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 20px;
            align-items: center;
        }

        .quote-preview .quote-contact {
            text-align: left;
        }

        .quote-title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin: 0 auto;
            color: #111827;
        }

        .quote-top-details {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .quote-top-details div {
            font-size: 12px;
            color: #374151;
            line-height: 1.7;
        }

        .quote-top-details strong {
            display: block;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .quote-preview table.quote-table th,
        .quote-preview table.quote-table td {
            padding: 10px 12px;
            border: 1px solid var(--border);
        }

        .quote-preview table.quote-table th {
            background: #7C2D12;
            color: #fff;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-align: left;
        }

        .quote-preview table.quote-table td {
            color: #374151;
            vertical-align: top;
        }

        .quote-table-section-row td {
            background: #7C2D12;
            color: #fff;
            font-weight: 700;
            padding: 10px 12px;
        }

        .quote-table-category-total-row td {
            border-top: 2px solid #7C2D12;
            background: #FDF2F2;
            font-weight: 700;
            color: #111827;
        }

        .quote-table-category-total-row td:first-child {
            border: none;
        }

        .quote-table-category-total-row td:nth-child(3),
        .quote-table-category-total-row td:nth-child(4) {
            text-align: right;
        }

        .quote-preview .quote-summary {
            display: grid;
            grid-template-columns: 1fr minmax(240px, 340px);
            gap: 18px;
            align-items: start;
        }

        .quote-preview .quote-summary .quote-total {
            display: grid;
            gap: 10px;
            padding: 18px;
            border: 1px solid #7C2D12;
            background: #FEF3F2;
        }

        .quote-preview .quote-summary .quote-total div {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #374151;
        }

        .quote-preview .quote-summary .quote-total div strong {
            color: #111827;
        }

        .quote-preview .quote-summary .quote-total-final {
            margin-top: 8px;
            font-size: 15px;
            letter-spacing: 0.02em;
        }

        .quote-terms-list {
            padding-left: 18px;
            margin: 0;
            color: #4B5563;
            font-size: 12px;
            line-height: 1.7;
            list-style: square inside;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #quote-preview, #quote-preview * {
                visibility: visible;
            }
            #quote-preview {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                box-shadow: none;
            }
            .quote-preview .quote-actions {
                display: none !important;
            }
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .quote-layout {
                grid-template-columns: 1fr;
            }
            .quote-preview {
                min-height: auto;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 60px;
            }

            .main {
                padding: 16px;
            }

            .auth-right {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { renderDashboard } from './sections/dashboard.js';
        import { renderNewQuote } from './sections/newQuote.js';
        import { renderQuotesList } from './sections/quotes.js';
        import { renderCatalog } from './sections/catalog.js';
        import { renderClients } from './sections/clients.js';
        import { renderUsers } from './sections/users.js';
        import { renderSettings } from './sections/settings.js';

        // API BASE URL
        const API_BASE = './api';

        // Utility Functions
        const API = {
            async request(endpoint, method = 'GET', body = null) {
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };

                const token = localStorage.getItem('auth_token');
                if (token) {
                    options.headers.Authorization = `Bearer ${token}`;
                }

                if (body) {
                    options.body = JSON.stringify(body);
                }

                try {
                    const response = await fetch(`${API_BASE}/${endpoint}`, options);
                    if (!response.ok && response.status === 401) {
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('user');
                        window.location.reload();
                    }
                    return await response.json();
                } catch (error) {
                    console.error('API Error:', error);
                    return { error: 'Network error' };
                }
            },

            auth: {
                login: (email, password) => API.request('auth/login', 'POST', { email, password }),
                register: (name, email, password) => API.request('auth/register', 'POST', { name, email, password }),
                verify: () => API.request('auth/verify'),
            },

            users: {
                getAll: () => API.request('users'),
                create: (user) => API.request('users', 'POST', user),
                update: (id, user) => API.request(`users/${id}`, 'PUT', user),
                delete: (id) => API.request(`users/${id}`, 'DELETE'),
            },

            company: {
                get: () => API.request('company'),
                save: (company) => API.request('company', 'POST', company),
            },

            catalog: {
                getAll: () => API.request('catalog'),
                get: (id) => API.request(`catalog/${id}`),
                create: (item) => API.request('catalog', 'POST', item),
                update: (id, item) => API.request(`catalog/${id}`, 'PUT', item),
                delete: (id) => API.request(`catalog/${id}`, 'DELETE'),
            },

            clients: {
                getAll: () => API.request('clients'),
                get: (id) => API.request(`clients/${id}`),
                create: (client) => API.request('clients', 'POST', client),
                update: (id, client) => API.request(`clients/${id}`, 'PUT', client),
                delete: (id) => API.request(`clients/${id}`, 'DELETE'),
            },

            quotes: {
                getAll: () => API.request('quotes'),
                get: (id) => API.request(`quotes/${id}`),
                create: (quote) => API.request('quotes', 'POST', quote),
                update: (id, quote) => API.request(`quotes/${id}`, 'PUT', quote),
                delete: (id) => API.request(`quotes/${id}`, 'DELETE'),
            },

            stats: {
                get: () => API.request('stats'),
            }
        };

        // Helper Functions
        const helpers = {
            generateId: () => {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            },

            formatDate: (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
            },

            formatMoney: (amount, currency = 'KES') => {
                return `${currency} ${Number(amount || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            },

            addDays: (date, days) => {
                const result = new Date(date);
                result.setDate(result.getDate() + days);
                return result.toISOString().slice(0, 10);
            },

            today: () => new Date().toISOString().slice(0, 10),
        };

        // State Management
        const app = {
            state: {
                page: 'auth',
                authMode: 'login',
                user: JSON.parse(localStorage.getItem('user')) || null,
                view: 'dashboard',
                loading: true,
                toast: null,
                company: {},
                catalog: [],
                clients: [],
                quotes: [],
                users: [],
                previewQuote: null,
                catalogModal: null,
                clientModal: null,
                dropdowns: null,
            },

            notify: (msg, type = 'success') => {
                app.state.toast = { msg, type };
                app.render();
                setTimeout(() => {
                    app.state.toast = null;
                    app.render();
                }, 3200);
            },

            setPage: (page) => {
                app.state.page = page;
                app.render();
            },

            setView: (view) => {
                app.state.view = view;
                app.render();
            },

            async handleLogin(email, password) {
                const result = await API.auth.login(email, password);
                if (result.success) {
                    localStorage.setItem('auth_token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    app.state.user = result.user;
                    app.state.page = 'app';
                    app.loadAppData();
                    app.render();
                } else {
                    app.notify(result.error, 'error');
                }
            },

            async handleRegister(name, email, password) {
                const result = await API.auth.register(name, email, password);
                if (result.success) {
                    app.notify(result.message, 'success');
                    app.state.authMode = 'login';

            async loadAppData() {
                app.loadDropdownSettings();

                const [company, catalog, clients, quotes, stats] = await Promise.all([
                    API.company.get(),
                    API.catalog.getAll(),
                    API.clients.getAll(),
                    API.quotes.getAll(),
                    API.stats.get(),
                ]);

                app.state.company = company || {};
                app.state.catalog = catalog || [];
                app.state.clients = clients || [];
                app.state.quotes = quotes || [];
                app.state.stats = stats || {};
                app.state.loading = false;
                app.state.catalogModal = null;
                app.state.clientModal = null;
                app.render();
            },

            loadDropdownSettings() {
                const defaults = {
                    categories: ['General', 'Church Setup', 'Tent & Décor', 'Flowers', 'Logistics', 'Maintenance', 'Development', 'Services', 'Installation'],
                    margins: [10, 15, 20, 25, 30, 35, 40],
                    units: ['unit', 'hr', 'lot', 'project', 'year']
                };
                const dropdowns = {};

                Object.keys(defaults).forEach(key => {
                    const stored = localStorage.getItem(`quote_system_dropdown_${key}`);
                    if (stored) {
                        try {
                            const parsed = JSON.parse(stored);
                            dropdowns[key] = Array.isArray(parsed) ? parsed : defaults[key];
                        } catch {
                            dropdowns[key] = defaults[key];
                        }
                    } else {
                        dropdowns[key] = defaults[key];
                    }
                });

                app.state.dropdowns = dropdowns;
            },

            saveDropdownSettings() {
                if (!app.state.dropdowns) return;

                Object.keys(app.state.dropdowns).forEach(key => {
                    localStorage.setItem(`quote_system_dropdown_${key}`, JSON.stringify(app.state.dropdowns[key]));
                });
            },

            initializeQuoteDraft() {
                if (app.state.quoteDraft) return app.state.quoteDraft;

                const today = helpers.today();
                const validDays = 30;
                const defaultUnit = app.state.dropdowns?.units?.[0] || 'unit';

                app.state.quoteDraft = {
                    id: helpers.generateId(),
                    client_id: '',
                    client_name: '',
                    client_company: '',
                    title: '',
                    venue: '',
                    guests: '',
                    contact_person: '',
                    quote_date: today,
                    valid_days: validDays,
                    valid_until: helpers.addDays(today, validDays),
                    include_vat: true,
                    vat_rate: 16,
                    subtotal: '0.00',
                    vat_amount: '0.00',
                    total: '0.00',
                    status: 'draft',
                    notes: '',
                    number: '',
                    items: [
                        {
                            id: helpers.generateId(),
                            name: '',
                            description: '',
                            category: app.state.dropdowns?.categories?.[0] || 'General',
                            quantity: 1,
                            unit: defaultUnit,
                            unit_price: '0.00',
                            margin: 20,
                        }
                    ]
                };
                return app.state.quoteDraft;
            },

            updateQuoteTotals(quote) {
                if (!quote) quote = app.initializeQuoteDraft();

                const subtotal = quote.items.reduce((sum, item) => {
                    const quantity = Number(item.quantity) || 0;
                    const unit_price = Number(item.unit_price) || 0;
                    return sum + (quantity * unit_price);
                }, 0);

                const vatRate = Number(quote.vat_rate) || 0;
                const vatAmount = quote.include_vat ? (subtotal * vatRate / 100) : 0;
                const total = subtotal + vatAmount;

                quote.subtotal = subtotal.toFixed(2);
                quote.vat_amount = vatAmount.toFixed(2);
                quote.total = total.toFixed(2);
            },

            handleQuoteClientSelect(e) {
                const clientId = e.currentTarget.value;
                const quote = app.initializeQuoteDraft();
                quote.client_id = clientId;

                const client = app.state.clients.find(c => c.id === clientId);
                if (client) {
                    quote.client_name = client.name || '';
                    quote.client_company = client.company || '';
                }
                app.render();
            },

            handleQuoteInputChange(field, value) {
                const quote = app.initializeQuoteDraft();

                if (field === 'quote_date') {
                    quote.quote_date = value;
                    quote.valid_until = helpers.addDays(value, Number(quote.valid_days) || 0);
                } else if (field === 'valid_days') {
                    quote.valid_days = Number(value) || 0;
                    quote.valid_until = helpers.addDays(quote.quote_date, Number(quote.valid_days));
                } else if (field === 'include_vat') {
                    quote.include_vat = value === 'true' || value === true || value === '1';
                } else if (field === 'vat_rate') {
                    quote.vat_rate = Number(value) || 0;
                } else if (field === 'status') {
                    quote.status = value;
                } else if (field === 'notes') {
                    quote.notes = value;
                } else if (field === 'title') {
                    quote.title = value;
                } else if (field === 'venue') {
                    quote.venue = value;
                } else if (field === 'guests') {
                    quote.guests = value;
                } else if (field === 'contact_person') {
                    quote.contact_person = value;
                } else if (field === 'client_name') {
                    quote.client_name = value;
                    quote.client_id = '';
                } else if (field === 'client_company') {
                    quote.client_company = value;
                }

                app.updateQuoteTotals(quote);
                app.render();
            },

            handleQuoteItemChange(itemId, field, value) {
                const quote = app.initializeQuoteDraft();
                const item = quote.items.find(i => i.id === itemId);
                if (!item) return;

                if (field === 'quantity' || field === 'margin') {
                    item[field] = Number(value) || 0;
                } else if (field === 'unit_price') {
                    item[field] = value;
                } else {
                    item[field] = value;
                }

                app.updateQuoteTotals(quote);
                app.render();
            },

            addQuoteItem() {
                const quote = app.initializeQuoteDraft();
                quote.items.push({
                    id: helpers.generateId(),
                    name: '',
                    description: '',
                    quantity: 1,
                    unit: app.state.dropdowns?.units?.[0] || 'unit',
                    unit_price: '0.00',
                    margin: 20,
                });
                app.render();
            },

            removeQuoteItem(itemId) {
                const quote = app.initializeQuoteDraft();
                if (quote.items.length <= 1) return;
                quote.items = quote.items.filter(item => item.id !== itemId);
                app.updateQuoteTotals(quote);
                app.render();
            },

            async handleSaveQuote() {
                const quote = app.initializeQuoteDraft();
                if (!quote.client_name.trim()) {
                    app.notify('Please choose a client or enter a client name', 'error');
                    return;
                }
                if (!quote.quote_date) {
                    app.notify('Quote date is required', 'error');
                    return;
                }
                if (!quote.items.length) {
                    app.notify('Add at least one quote item', 'error');
                    return;
                }

                const payload = {
                    client_id: quote.client_id,
                    client_name: quote.client_name,
                    client_company: quote.client_company,
                    title: quote.title || '',
                    venue: quote.venue || '',
                    guests: quote.guests || '',
                    contact_person: quote.contact_person || '',
                    quote_date: quote.quote_date,
                    valid_days: Number(quote.valid_days) || 0,
                    valid_until: quote.valid_until,
                    subtotal: Number(quote.subtotal) || 0,
                    vat_rate: Number(quote.vat_rate) || 0,
                    vat_amount: Number(quote.vat_amount) || 0,
                    total: Number(quote.total) || 0,
                    include_vat: quote.include_vat,
                    status: quote.status || 'draft',
                    notes: quote.notes || '',
                    items: quote.items.map(item => ({
                        name: item.name,
                        description: item.description,
                        category: item.category || '',
                        quantity: Number(item.quantity) || 0,
                        unit: item.unit,
                        unit_price: Number(item.unit_price) || 0,
                        margin: Number(item.margin) || 0,
                    }))
                };

                const result = await API.quotes.create(payload);
                if (result.success) {
                    quote.id = result.id;
                    quote.number = result.number;
                    app.notify(`Quote ${result.number} saved`, 'success');
                    await app.loadAppData();
                    app.state.quoteDraft = quote;
                    app.render();
                } else {
                    app.notify(result.error || 'Failed to save quote', 'error');
                }
            },

            handlePrintQuote() {
                window.print();
            },

            handleDropdownAdd(type) {
                const current = app.state.dropdowns?.[type] || [];
                const label = type === 'margins' ? 'Margin percentage' : type === 'units' ? 'Unit name' : 'Category name';
                const value = window.prompt(`Add new ${label}`);
                if (!value) return;

                const newValue = type === 'margins' ? parseInt(value, 10) : value.trim();
                if (newValue === '' || Number.isNaN(newValue)) return;
                if (current.includes(newValue)) {
                    app.notify(`${label} already exists`, 'error');
                    return;
                }

                app.state.dropdowns[type] = [...current, newValue];
                app.saveDropdownSettings();
                app.notify(`${label} added`, 'success');
                app.render();
            },

            handleDropdownEdit(type, oldValue) {
                const current = app.state.dropdowns?.[type] || [];
                const label = type === 'margins' ? 'Margin percentage' : type === 'units' ? 'Unit name' : 'Category name';
                const parsedOldValue = type === 'margins' ? parseInt(oldValue, 10) : oldValue;
                const value = window.prompt(`Edit ${label}`, oldValue);
                if (value === null) return;

                const newValue = type === 'margins' ? parseInt(value, 10) : value.trim();
                if (newValue === '' || Number.isNaN(newValue)) return;
                if (newValue === parsedOldValue) return;

                app.state.dropdowns[type] = current.map(item => item === parsedOldValue ? newValue : item);
                app.saveDropdownSettings();
                app.notify(`${label} updated`, 'success');
                app.render();
            },

            handleDropdownDelete(type, oldValue) {
                const current = app.state.dropdowns?.[type] || [];
                const parsedOldValue = type === 'margins' ? parseInt(oldValue, 10) : oldValue;
                if (!window.confirm('Remove this dropdown value?')) return;

                app.state.dropdowns[type] = current.filter(item => item !== parsedOldValue);
                app.saveDropdownSettings();
                app.notify('Dropdown value deleted', 'success');
                app.render();
            },

                            <div style="display: flex; background: var(--bg); border-radius: 8px; padding: 4px; margin-bottom: 24px;">
                                <button class="auth-mode-btn" data-mode="login" style="flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: ${authMode === 'login' ? '#fff' : 'transparent'}; color: ${authMode === 'login' ? 'var(--navy)' : 'var(--gray)'}; box-shadow: ${authMode === 'login' ? '0 1px 4px rgba(0,0,0,0.1)' : 'none'}; transition: all 0.2s;">Sign In</button>
                                <button class="auth-mode-btn" data-mode="register" style="flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; background: ${authMode === 'register' ? '#fff' : 'transparent'}; color: ${authMode === 'register' ? 'var(--navy)' : 'var(--gray)'}; box-shadow: ${authMode === 'register' ? '0 1px 4px rgba(0,0,0,0.1)' : 'none'}; transition: all 0.2s;">Register</button>
                            </div>

                            <div style="display: flex; flex-direction: column; gap: 14px;">
                                ${authMode === 'register' ? '<div class="form-group"><label>Full Name</label><input type="text" id="reg-name" class="input-field" placeholder="Your full name"></div>' : ''}
                                <div class="form-group"><label>Email Address</label><input type="email" id="auth-email" class="input-field" placeholder="your@email.com"></div>
                                <div class="form-group"><label>Password</label><input type="password" id="auth-password" class="input-field" placeholder="Min. 6 characters"></div>
                            </div>

                            <button id="auth-submit" class="button navy" style="width: 100%; justify-content: center; padding: 12px; margin-top: 20px; font-size: 14px;">
                                ${authMode === 'login' ? 'Sign In →' : 'Submit Registration'}
                            </button>
                            ${authMode === 'login' ? '<p style="text-align: center; font-size: 11px; color: #9CA3AF; margin: 14px 0 0;">Default: admin@company.com / admin123</p>' : ''}
                        </div>
                    </div>
                `;
            },

            renderAppScreen: () => {
                const navItems = [
                    { id: 'dashboard', emoji: '⊞', label: 'Dashboard' },
                    { id: 'newquote', emoji: '📝', label: 'New Quote' },
                    { id: 'quotes', emoji: '📄', label: 'All Quotes' },
                    { id: 'catalog', emoji: '📦', label: 'Catalog' },
                    { id: 'clients', emoji: '👥', label: 'Clients' },
                    ...(app.state.user?.role === 'admin' ? [{ id: 'users', emoji: '🔑', label: 'Users' }] : []),
                    { id: 'settings', emoji: '⚙️', label: 'Settings' },
                ];

                return `
                    <div class="container">
                        <aside class="sidebar">
                            <div class="sidebar-header">
                                <div class="logo">📋</div>
                                <div class="company-name">${app.state.company.name || 'QuoteSystem'}</div>
                                <div class="user-name">${app.state.user?.name}</div>
                                <div class="role-badge">${app.state.user?.role?.toUpperCase()}</div>
                            </div>
                            <nav>
                                ${navItems.map(item => `
                                    <button class="nav-item ${app.state.view === item.id ? 'active' : ''}" data-view="${item.id}">
                                        <span>${item.emoji}</span>
                                        ${item.label}
                                    </button>
                                `).join('')}
                            </nav>
                            <div class="sidebar-footer">
                                <button id="logout-btn" class="logout-btn">🚪 Sign Out</button>
                            </div>
                        </aside>

                        <main class="main">
                            ${app.renderViewContent()}
                        </main>
                    </div>
                `;
            },

            renderViewContent: () => {
                const view = app.state.view;
                
                if (view === 'dashboard') {
                    return app.renderDashboard();
                } else if (view === 'newquote') {
                    return app.renderNewQuote();
                } else if (view === 'quotes') {
                    return app.renderQuotesList();
                } else if (view === 'catalog') {
                    return app.renderCatalog();
                } else if (view === 'clients') {
                    return app.renderClients();
                } else if (view === 'users') {
                    return app.renderUsers();
                } else if (view === 'settings') {
                    return app.renderSettings();
                }
                return '';
            },

            renderDashboard: () => {
                const stats = app.state.stats || {};
                return `
                    <div style="max-width: 1100px;">
                        <div class="page-header">
                            <div>
                                <h2 class="page-title">Dashboard</h2>
                                <p class="page-subtitle">Overview of your quotation activity</p>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon">📄</div>
                                <div class="stat-label">Total Quotes</div>
                                <div class="stat-value">${stats.total_quotes || 0}</div>
                            </div>
                            <div class="stat-card" style="border-top-color: var(--green);">
                                <div class="stat-icon">💰</div>
                                <div class="stat-label">Total Value</div>
                                <div class="stat-value">${helpers.formatMoney(stats.total_value, app.state.company.currency)}</div>
                            </div>
                            <div class="stat-card" style="border-top-color: var(--amber);">
                                <div class="stat-icon">⏳</div>
                                <div class="stat-label">Pending</div>
                                <div class="stat-value">${stats.pending || 0}</div>
                            </div>
                            <div class="stat-card" style="border-top-color: var(--green);">
                                <div class="stat-icon">✅</div>
                                <div class="stat-label">Accepted</div>
                                <div class="stat-value">${stats.accepted || 0}</div>
                            </div>
                            <div class="stat-card" style="border-top-color: #7C3AED;">
                                <div class="stat-icon">👥</div>
                                <div class="stat-label">Clients</div>
                                <div class="stat-value">${stats.clients || 0}</div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderNewQuote: () => renderNewQuote(app.state, helpers),
            renderQuotesList: () => renderQuotesList(app.state, helpers),
            renderCatalog: () => renderCatalog(app.state, helpers),
            renderClients: () => renderClients(app.state, helpers),
            renderUsers: () => renderUsers(app.state, helpers),
            renderSettings: () => renderSettings(app.state, helpers),

            attachEventListeners: () => {
                // Auth mode switching
                document.querySelectorAll('.auth-mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.state.authMode = e.target.dataset.mode;
                        app.render();
                    });
                });

                // Auth submit
                const submitBtn = document.getElementById('auth-submit');
                if (submitBtn) {
                    submitBtn.addEventListener('click', async () => {
                        const email = document.getElementById('auth-email')?.value;
                        const password = document.getElementById('auth-password')?.value;

                        if (app.state.authMode === 'login') {
                            if (!email || !password) {
                                app.notify('Please enter your email and password', 'error');
                                return;
                            }
                            await app.handleLogin(email, password);
                        } else {
                            const name = document.getElementById('reg-name')?.value;
                            if (!name || !email || !password) {
                                app.notify('All fields are required', 'error');
                                return;
                            }
                            if (password.length < 6) {
                                app.notify('Password must be at least 6 characters', 'error');
                                return;
                            }
                            await app.handleRegister(name, email, password);
                        }
                    });
                }

                // Navigation
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        app.setView(e.currentTarget.dataset.view);
                    });
                });

                // Catalog actions
                const addBtn = document.querySelector('.catalog-add-btn');
                if (addBtn) {
                    addBtn.addEventListener('click', app.handleCatalogAdd);
                }

                document.querySelectorAll('.catalog-edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleCatalogEdit(e.currentTarget.dataset.id);
                    });
                });

                document.querySelectorAll('.catalog-delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleCatalogDelete(e.currentTarget.dataset.id);
                    });
                });

                const clientsAddBtn = document.querySelector('.clients-add-btn');
                if (clientsAddBtn) {
                    clientsAddBtn.addEventListener('click', app.handleClientsAdd);
                }

                document.querySelectorAll('.client-edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleClientEdit(e.currentTarget.dataset.id);
                    });
                });

                document.querySelectorAll('.client-delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleClientDelete(e.currentTarget.dataset.id);
                    });
                });

                document.querySelectorAll('.dropdown-add-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleDropdownAdd(e.currentTarget.dataset.type);
                    });
                });

                document.querySelectorAll('.dropdown-edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleDropdownEdit(e.currentTarget.dataset.type, e.currentTarget.dataset.value);
                    });
                });

                document.querySelectorAll('.dropdown-delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        app.handleDropdownDelete(e.currentTarget.dataset.type, e.currentTarget.dataset.value);
                    });
                });

                const modalCloseButtons = document.querySelectorAll('.catalog-modal-close');
                modalCloseButtons.forEach(btn => {
                    btn.addEventListener('click', app.closeCatalogModal);
                });

                const modalSaveButton = document.querySelector('.catalog-modal-save');
                if (modalSaveButton) {
                    modalSaveButton.addEventListener('click', app.saveCatalogModal);
                }

                const clientModalCloseButtons = document.querySelectorAll('.client-modal-close');
                clientModalCloseButtons.forEach(btn => {
                    btn.addEventListener('click', app.closeClientModal);
                });

                const clientModalSaveButton = document.querySelector('.client-modal-save');
                if (clientModalSaveButton) {
                    clientModalSaveButton.addEventListener('click', app.saveClientModal);
                }

                const quoteClientSelect = document.getElementById('quote-client-select');
                if (quoteClientSelect) {
                    quoteClientSelect.addEventListener('change', app.handleQuoteClientSelect);
                }

                document.querySelectorAll('[data-quote-field]').forEach(element => {
                    element.addEventListener('input', (e) => {
                        const field = e.currentTarget.dataset.quoteField;
                        app.handleQuoteInputChange(field, e.currentTarget.type === 'checkbox' ? e.currentTarget.checked : e.currentTarget.value);
                    });
                });

                document.querySelectorAll('[data-quote-item-field]').forEach(element => {
                    element.addEventListener('input', (e) => {
                        const itemId = e.currentTarget.dataset.itemId;
                        const field = e.currentTarget.dataset.quoteItemField;
                        app.handleQuoteItemChange(itemId, field, e.currentTarget.value);
                    });
                });

                document.querySelectorAll('.quote-item-remove-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const itemId = e.currentTarget.dataset.itemId;
                        app.removeQuoteItem(itemId);
                    });
                });

                const addQuoteItemBtn = document.getElementById('quote-add-item');
                if (addQuoteItemBtn) {
                    addQuoteItemBtn.addEventListener('click', app.addQuoteItem);
                }

                const saveQuoteBtn = document.getElementById('quote-save-btn');
                if (saveQuoteBtn) {
                    saveQuoteBtn.addEventListener('click', app.handleSaveQuote);
                }

                const printQuoteBtn = document.getElementById('quote-print-btn');
                if (printQuoteBtn) {
                    printQuoteBtn.addEventListener('click', app.handlePrintQuote);
                }

                // Logout
                const logoutBtn = document.getElementById('logout-btn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', app.handleLogout);
                }
            }
        };

        // Initialize app
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                const verified = await API.auth.verify();
                if (verified.valid) {
                    app.state.user = verified.user;
                    app.state.page = 'app';
                    app.loadAppData();
                } else {
                    app.state.loading = false;
                    app.render();
                }
            } else {
                app.state.loading = false;
                app.render();
            }
        });
    </script>
</body>
</html>
